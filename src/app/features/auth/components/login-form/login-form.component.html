<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
  <z-form-field>
    <z-form-label>Email ou Username</z-form-label>
    <z-form-control>
      <input
        z-input
        type="text"
        formControlName="emailOrUsername"
        placeholder="seu@email.com ou username"
        class="w-full"
      />
    </z-form-control>
    @if (hasError('emailOrUsername')) {
      <p class="text-sm text-red-500 mt-1">{{ getErrorMessage('emailOrUsername') }}</p>
    }
  </z-form-field>

  <z-form-field>
    <z-form-label>Senha</z-form-label>
    <z-form-control>
      <input
        z-input
        type="password"
        formControlName="password"
        placeholder="••••••"
        class="w-full"
      />
    </z-form-control>
    @if (hasError('password')) {
      <p class="text-sm text-red-500 mt-1">{{ getErrorMessage('password') }}</p>
    }
  </z-form-field>

  <div class="text-right">
    <a routerLink="/forgot-password" class="text-sm text-blue-600 hover:underline">
      Esqueci a senha
    </a>
  </div>

  <button z-button type="submit" class="w-full" [disabled]="form.invalid || isLoading">
    {{ isLoading ? 'Entrando...' : 'Entrar' }}
  </button>
</form>
